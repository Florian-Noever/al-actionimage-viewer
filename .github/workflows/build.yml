on:
  release:
    types: [published]

name: Build and Package Extension
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Publish for Windows
        run: |
          dotnet publish \
            "AL-ActionImage-Viewer.ImageInformationProvider/AL-ActionImage-Viewer.ImageInformationProvider/AL-ActionImage-Viewer.ImageInformationProvider.csproj" \
            /p:PublishProfile=win32

      - name: Publish for Linux
        run: |
          dotnet publish \
            "AL-ActionImage-Viewer.ImageInformationProvider/AL-ActionImage-Viewer.ImageInformationProvider/AL-ActionImage-Viewer.ImageInformationProvider.csproj" \
            /p:PublishProfile=linux

      - name: Publish for macOS
        run: |
          dotnet publish \
            "AL-ActionImage-Viewer.ImageInformationProvider/AL-ActionImage-Viewer.ImageInformationProvider/AL-ActionImage-Viewer.ImageInformationProvider.csproj" \
            /p:PublishProfile=darwin

      - name: Verify bin folder
        run: |
          missing=0
          for platform in win32 linux darwin; do
            dir="bin/$platform"
            if [ ! -d "$dir" ]; then
              echo "❌ Missing directory: $dir"
              missing=1
            else
              count=$(find "$dir" -maxdepth 1 -type f | wc -l)
              if [ "$count" -eq 0 ]; then
                echo "❌ Directory is empty: $dir"
                missing=1
              else
                echo "✅ $dir — $(ls $dir)"
              fi
            fi
          done
          exit $missing

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
