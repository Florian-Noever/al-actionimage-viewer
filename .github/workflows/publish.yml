on:
  workflow_run:
    workflows: ["Build and Package Extension"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g. v1.2.3)'
        required: true

name: Publish Extension
jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-tags: true

      - name: Get release tag
        id: tag
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git tag --points-at HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Download VSIX from release
        run: gh release download "${{ steps.tag.outputs.tag }}" --pattern "*.vsix"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Currently AL-Language is not available on Open VSX Registry
